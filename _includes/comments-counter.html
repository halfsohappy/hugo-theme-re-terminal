<!--
To add a comments counter, create _includes/comments-counter.html in your Jekyll site
and insert your comment counter code. For example, for Disqus:

{% if site.disqus.shortname %}
  <span>
    <a class="disqus_comments" href="{{ include.post.url | absolute_url }}#disqus_thread">
      <span class="disqus-comment-count"
        data-disqus-url="{{ include.post.url | absolute_url }}">0 {{ site.comments | default: "comments" }}</span>
    </a>
  </span>
{% endif %}
-->
