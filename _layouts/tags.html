---
layout: default
---
<div class="terms">
  <h1>{{ page.title }}</h1>
  {% if page.content != "" %}
    <div class="index-content">
      {{ content }}
    </div>
  {% endif %}
  <ul>
    {% for tag in site.tags %}
      {% assign tag_name = tag[0] %}
      {% assign tag_posts = tag[1] %}
      <li>
        <a class="terms-title" href="{{ site.baseurl }}/tags/{{ tag_name | slugify }}/">{{ tag_name }} [{{ tag_posts.size }}]</a>
      </li>
    {% endfor %}
  </ul>
</div>
